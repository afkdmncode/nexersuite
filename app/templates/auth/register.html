{% extends "base.html" %}
{% block title %}Register — NexerSuite{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-2">Create Account</h1>
        <p class="text-gray-500 text-sm text-center mb-8">Get started with NexerSuite</p>
        <form method="POST" class="space-y-4">
            {% if error %}
            <div class="bg-red-900/30 border border-red-800 text-red-400 text-sm rounded-lg p-3">{{ error }}</div>
            {% endif %}
            <div>
                <label class="block text-sm text-gray-400 mb-1">Username</label>
                <input type="text" name="username" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" name="email" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" minlength="6" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" minlength="6" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Create Account</button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-500">Already have an account? <a href="/auth/login" class="text-purple-400 hover:text-purple-300 transition">Sign in</a></p>
    </div>
</div>
{% endblock %}
