{% extends "base.html" %}
{% block title %}Set New Password — NexerSuite{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-2">Set New Password</h1>
        <form method="POST" class="space-y-4">
            {% if error %}
            <div class="bg-red-900/30 border border-red-800 text-red-400 text-sm rounded-lg p-3">{{ error }}</div>
            {% endif %}
            <div>
                <label class="block text-sm text-gray-400 mb-1">New Password</label>
                <input type="password" name="password" minlength="6" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" minlength="6" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
