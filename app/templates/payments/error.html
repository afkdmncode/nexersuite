{% extends "base.html" %}
{% block title %}Payment Error — NexerSuite{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="text-center max-w-sm">
        <div class="w-16 h-16 bg-red-900/30 border border-red-800 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </div>
        <h1 class="text-2xl font-bold mb-2">Payment Error</h1>
        <p class="text-gray-500 text-sm mb-2">{{ message }}</p>
        <p class="text-gray-600 text-xs mb-8">Please try again or contact support.</p>
        <a href="/auth/profile" class="inline-block bg-gray-800 hover:bg-gray-700 text-white rounded-lg px-6 py-2.5 text-sm font-medium border border-gray-700 transition">Back to Profile</a>
    </div>
</div>
{% endblock %}
