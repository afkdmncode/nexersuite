{% extends "base.html" %}
{% block title %}Audio Translation — NexerSuite{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Audio Translation</h1>
    <p class="text-gray-500 text-sm mb-6">Transcribe and translate audio — uses 5 credits</p>
    <form id="translateForm" enctype="multipart/form-data" class="space-y-4">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Upload Audio</label>
                <input type="file" name="file" accept="audio/*" required class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:bg-gray-800 file:text-gray-300 hover:file:bg-gray-700">
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-400 mb-2">Target Language</label>
                <select name="target_language" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                </select>
            </div>
            <button type="submit" class="mt-4 w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Translate</button>
        </div>
    </form>
    <div id="result" class="mt-4 hidden">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <h3 class="text-sm font-medium mb-2">Translated Text</h3>
            <p id="translatedText" class="text-sm text-gray-300"></p>
            <p id="creditsInfo" class="text-xs text-gray-500 mt-2"></p>
        </div>
    </div>
</div>
<script>
document.getElementById('translateForm').onsubmit = async (e) => {
    e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Translating...'; btn.disabled = true;
    const res = await fetch('/tools/audio/translate', {method:'POST', body:new FormData(e.target)});
    const d = await res.json();
    if (d.text) {
        document.getElementById('translatedText').textContent = d.text;
        document.getElementById('creditsInfo').textContent = `Credits remaining: ${d.credits_remaining}`;
        document.getElementById('result').classList.remove('hidden');
    } else { alert(d.error); }
    btn.textContent = 'Translate'; btn.disabled = false;
};
</script>
{% endblock %}
