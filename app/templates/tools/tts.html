{% extends "base.html" %}
{% block title %}Text to Speech — NovaForge{% endblock %}
{% block content %}

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
        <h1 class="text-2xl font-bold">Text to Speech</h1>
        <p class="text-sm text-gray-500">Convert text to natural speech audio. <span class="text-purple-400">3 credits per 100 chars</span></p>
    </div>

    <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
        <textarea id="tts-text" rows="5" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500/50 resize-none" placeholder="Enter text to convert to speech..."></textarea>

        <div class="flex items-center space-x-3 mt-3">
            <select id="tts-lang" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500/50">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="ja">Japanese</option>
                <option value="zh-CN">Chinese</option>
            </select>
            <button id="tts-btn" class="bg-gradient-to-r from-purple-600 to-cyan-500 rounded-xl px-6 py-2 text-sm font-medium hover:opacity-90 transition disabled:opacity-50" disabled>
                Generate Speech
            </button>
        </div>

        <div id="tts-result" class="mt-4 hidden">
            <audio id="tts-audio" controls class="w-full"></audio>
        </div>

        <div id="tts-loading" class="mt-4 text-center hidden">
            <div class="animate-spin w-6 h-6 border-2 border-purple-500 border-t-transparent rounded-full mx-auto mb-2"></div>
            <p class="text-sm text-gray-500">Generating audio...</p>
        </div>

        <div id="tts-error" class="mt-4 text-center text-red-400 text-sm hidden"></div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const text = document.getElementById('tts-text');
    const btn = document.getElementById('tts-btn');
    const result = document.getElementById('tts-result');
    const audio = document.getElementById('tts-audio');
    const loading = document.getElementById('tts-loading');
    const error = document.getElementById('tts-error');
    const lang = document.getElementById('tts-lang');

    text.addEventListener('input', () => {
        btn.disabled = !text.value.trim();
    });

    btn.addEventListener('click', async () => {
        const content = text.value.trim();
        if (!content) return;

        result.classList.add('hidden');
        error.classList.add('hidden');
        loading.classList.remove('hidden');
        btn.disabled = true;

        try {
            const res = await fetch('/tools/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: content, lang: lang.value })
            });
            if (res.status === 402) {
                const data = await res.json();
                loading.classList.add('hidden');
                btn.disabled = false;
                error.textContent = data.message || 'Insufficient credits.';
                error.classList.remove('hidden');
                return;
            }
            if (!res.ok) {
                loading.classList.add('hidden');
                btn.disabled = false;
                error.textContent = 'Error generating speech.';
                error.classList.remove('hidden');
                return;
            }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            audio.src = url;
            result.classList.remove('hidden');
            loading.classList.add('hidden');
            btn.disabled = false;
        } catch (e) {
            loading.classList.add('hidden');
            btn.disabled = false;
            error.textContent = 'Error generating speech.';
            error.classList.remove('hidden');
        }
    });
});
</script>
{% endblock %}
