{% extends "base.html" %}
{% block title %}Resume Builder — NexerSuite{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Resume Builder</h1>
    <p class="text-gray-500 text-sm mb-6">Create a professional resume with AI — uses 8 credits</p>
    <form id="resumeForm" class="space-y-4">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Target Job Title</label>
                <input type="text" name="job_title" placeholder="e.g. Senior Software Engineer" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-400 mb-2">Your Skills (comma separated)</label>
                <input type="text" name="skills" placeholder="Python, React, AWS, Docker" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-400 mb-2">Experience / Background</label>
                <textarea name="experience" rows="4" placeholder="Briefly describe your work experience and education" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500"></textarea>
            </div>
            <button type="submit" class="mt-4 w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Generate Resume</button>
        </div>
    </form>
    <div id="result" class="mt-4 hidden">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <h3 class="text-sm font-medium mb-2">Your Resume</h3>
            <pre id="resumeOutput" class="text-sm text-gray-300 bg-gray-950 rounded-lg p-4 overflow-x-auto whitespace-pre-wrap"></pre>
            <button onclick="copyResume()" class="mt-3 text-xs text-purple-400 hover:text-purple-300 transition">Copy to clipboard</button>
            <p id="creditsInfo" class="text-xs text-gray-500 mt-2"></p>
        </div>
    </div>
</div>
<script>
document.getElementById('resumeForm').onsubmit = async (e) => {
    e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Generating...'; btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const res = await fetch('/tools/forms/resume', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const d = await res.json();
    if (d.resume) {
        document.getElementById('resumeOutput').textContent = d.resume;
        document.getElementById('creditsInfo').textContent = `Credits remaining: ${d.credits_remaining}`;
        document.getElementById('result').classList.remove('hidden');
    } else { alert(d.error); }
    btn.textContent = 'Generate Resume'; btn.disabled = false;
};
function copyResume() {
    navigator.clipboard.writeText(document.getElementById('resumeOutput').textContent);
}
</script>
{% endblock %}
