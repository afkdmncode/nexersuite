{% extends "base.html" %}
{% block title %}Document Translate — NexerSuite{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Document Translate</h1>
    <p class="text-gray-500 text-sm mb-6">Translate text between languages — uses 10 credits</p>
    <form id="translateForm" class="space-y-4">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Text to Translate</label>
                <textarea name="text" rows="6" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500"></textarea>
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-400 mb-2">Target Language</label>
                <select name="target_language" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm">
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Portuguese">Portuguese</option>
                    <option value="Russian">Russian</option>
                    <option value="Hindi">Hindi</option>
                </select>
            </div>
            <button type="submit" class="mt-4 w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Translate</button>
        </div>
    </form>
    <div id="result" class="mt-4 hidden">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <h3 class="text-sm font-medium mb-2">Translation</h3>
            <p id="translationText" class="text-sm text-gray-300"></p>
            <p id="creditsInfo" class="text-xs text-gray-500 mt-2"></p>
        </div>
    </div>
</div>
<script>
document.getElementById('translateForm').onsubmit = async (e) => {
    e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Translating...'; btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const res = await fetch('/tools/document/translate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const d = await res.json();
    if (d.translation) {
        document.getElementById('translationText').textContent = d.translation;
        document.getElementById('creditsInfo').textContent = `Credits remaining: ${d.credits_remaining}`;
        document.getElementById('result').classList.remove('hidden');
    } else { alert(d.error); }
    btn.textContent = 'Translate'; btn.disabled = false;
};
</script>
{% endblock %}
