{% extends "base.html" %}
{% block title %}Form Builder — NexerSuite{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Form Builder</h1>
    <p class="text-gray-500 text-sm mb-6">Build custom HTML forms with AI — uses 12 credits</p>
    <form id="formBuilder" class="space-y-4">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Form Title</label>
                <input type="text" name="title" value="Contact Form" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-400 mb-2">Fields (JSON array)</label>
                <textarea name="fields" rows="4" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm font-mono focus:outline-none focus:border-purple-500">[{"type":"text","label":"Name","required":true},{"type":"email","label":"Email","required":true},{"type":"textarea","label":"Message","required":true}]</textarea>
            </div>
            <button type="submit" class="mt-4 w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Generate Form</button>
        </div>
    </form>
    <div id="result" class="mt-4 hidden">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <h3 class="text-sm font-medium mb-2">Generated HTML</h3>
            <pre id="htmlOutput" class="text-sm text-gray-300 bg-gray-950 rounded-lg p-4 overflow-x-auto"></pre>
            <button onclick="copyHtml()" class="mt-3 text-xs text-purple-400 hover:text-purple-300 transition">Copy HTML</button>
            <p id="creditsInfo" class="text-xs text-gray-500 mt-2"></p>
        </div>
    </div>
</div>
<script>
document.getElementById('formBuilder').onsubmit = async (e) => {
    e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Generating...'; btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    try { data.fields = JSON.parse(data.fields); } catch(e) { alert('Invalid JSON in fields'); btn.textContent = 'Generate Form'; btn.disabled = false; return; }
    const res = await fetch('/tools/forms/build', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const d = await res.json();
    if (d.html) {
        document.getElementById('htmlOutput').textContent = d.html;
        document.getElementById('creditsInfo').textContent = `Credits remaining: ${d.credits_remaining}`;
        document.getElementById('result').classList.remove('hidden');
    } else { alert(d.error); }
    btn.textContent = 'Generate Form'; btn.disabled = false;
};
function copyHtml() {
    navigator.clipboard.writeText(document.getElementById('htmlOutput').textContent);
}
</script>
{% endblock %}
