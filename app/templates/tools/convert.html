{% extends "base.html" %}
{% block title %}Document Convert — NexerSuite{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Document Convert</h1>
    <p class="text-gray-500 text-sm mb-6">Convert documents between formats (PDF, DOCX, TXT, etc.) — uses 8 credits</p>
    <form id="convertForm" enctype="multipart/form-data" class="space-y-4">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Upload Document</label>
                <input type="file" name="file" required class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:bg-gray-800 file:text-gray-300 hover:file:bg-gray-700">
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-400 mb-2">Target Format</label>
                <select name="format" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm">
                    <option value="pdf">PDF</option>
                    <option value="docx">DOCX</option>
                    <option value="txt">TXT</option>
                    <option value="html">HTML</option>
                </select>
            </div>
            <button type="submit" class="mt-4 w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Convert</button>
        </div>
    </form>
    <div id="result" class="mt-4 hidden"></div>
</div>
<script>
document.getElementById('convertForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Converting...'; btn.disabled = true;
    const res = await fetch('/tools/document/convert', {method:'POST', body:new FormData(e.target)});
    if (res.headers.get('content-type')?.includes('json')) {
        const d = await res.json();
        document.getElementById('result').innerHTML = `<div class="bg-red-900/30 border border-red-800 text-red-400 text-sm rounded-lg p-4">${d.error}</div>`;
        document.getElementById('result').classList.remove('hidden');
    } else {
        const blob = await res.blob();
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'converted.' + e.target.format?.value || 'pdf'; a.click();
    }
    btn.textContent = 'Convert'; btn.disabled = false;
};
</script>
{% endblock %}
