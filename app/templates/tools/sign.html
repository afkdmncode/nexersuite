{% extends "base.html" %}
{% block title %}Digital Signatures — NexerSuite{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
        <h1 class="text-2xl font-bold">Digital Signatures</h1>
        <p class="text-sm text-gray-500">Sign documents digitally. <span class="text-purple-400">12 credits</span></p>
    </div>

    <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Document Description</label>
                <textarea id="text-input" rows="3" placeholder="Enter document text or description" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Signer Name</label>
                    <input type="text" id="signer-input" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Date</label>
                    <input type="date" id="date-input" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500">
                </div>
            </div>
            <button id="submit-btn" class="w-full bg-gradient-to-r from-purple-600 to-cyan-500 rounded-xl px-6 py-3 text-sm font-medium hover:opacity-90 transition disabled:opacity-50">Sign Document</button>
        </div>

        <div id="result" class="mt-4 hidden">
            <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6 text-center">
                <p id="output-text" class="text-sm text-gray-300"></p>
                <p id="credits-info" class="text-xs text-gray-500 mt-2"></p>
            </div>
        </div>

        <div id="loading" class="mt-4 text-center hidden">
            <div class="animate-spin w-6 h-6 border-2 border-purple-500 border-t-transparent rounded-full mx-auto mb-2"></div>
            <p class="text-sm text-gray-500">Signing document...</p>
        </div>

        <div id="error" class="mt-4 text-center text-red-400 text-sm hidden"></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const textInput = document.getElementById('text-input');
    const signerInput = document.getElementById('signer-input');
    const dateInput = document.getElementById('date-input');
    const submitBtn = document.getElementById('submit-btn');
    const result = document.getElementById('result');
    const outputText = document.getElementById('output-text');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const creditsInfo = document.getElementById('credits-info');

    if (!dateInput.value) {
        dateInput.value = new Date().toISOString().split('T')[0];
    }

    submitBtn.addEventListener('click', async () => {
        if (!textInput.value.trim() || !signerInput.value.trim()) {
            error.textContent = 'Please fill in all required fields.';
            error.classList.remove('hidden');
            return;
        }

        result.classList.add('hidden');
        error.classList.add('hidden');
        loading.classList.remove('hidden');
        submitBtn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('text', textInput.value.trim());
            formData.append('signer_name', signerInput.value.trim());
            formData.append('date', dateInput.value);

            const res = await fetch('/tools/document/sign', { method: 'POST', body: formData });
            loading.classList.add('hidden');
            submitBtn.disabled = false;

            if (res.status === 402) {
                const data = await res.json();
                error.textContent = data.message || 'Insufficient credits.';
                error.classList.remove('hidden');
                return;
            }
            if (res.headers.get('content-type')?.includes('json')) {
                const data = await res.json();
                if (data.error) { error.textContent = data.error; error.classList.remove('hidden'); return; }
                outputText.textContent = data.text || 'Document signed.';
                creditsInfo.textContent = `Credits remaining: ${data.credits_remaining}`;
                result.classList.remove('hidden');
                updateCredits(data.credits_remaining);
            } else {
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'signed_document.pdf';
                a.click();
                outputText.textContent = 'Downloading signed document...';
                result.classList.remove('hidden');
            }
        } catch (e) {
            loading.classList.add('hidden');
            submitBtn.disabled = false;
            error.textContent = 'Error signing document.';
            error.classList.remove('hidden');
        }
    });
});
</script>
{% endblock %}
