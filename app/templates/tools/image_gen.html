{% extends "base.html" %}
{% block title %}Image Generation — NexerSuite{% endblock %}
{% block content %}

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
        <h1 class="text-2xl font-bold">Image Generation</h1>
        <p class="text-sm text-gray-500">Generate images from text descriptions. <span class="text-purple-400">20 credits</span></p>
    </div>

    <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
        <div class="flex space-x-3">
            <input type="text" id="prompt-input" placeholder="Describe the image you want to generate..." class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500/50">
            <button id="generate-btn" class="bg-gradient-to-r from-purple-600 to-cyan-500 rounded-xl px-6 py-3 text-sm font-medium hover:opacity-90 transition disabled:opacity-50" disabled>
                Generate
            </button>
        </div>

        <div id="gen-result" class="mt-4 hidden">
            <div class="bg-gray-950 border border-gray-800 rounded-xl p-4">
                <img id="gen-image" class="max-w-full rounded-lg" alt="Generated image">
                <div id="gen-response" class="mt-3 text-sm text-gray-400"></div>
            </div>
        </div>

        <div id="gen-loading" class="mt-4 text-center hidden">
            <div class="animate-spin w-6 h-6 border-2 border-purple-500 border-t-transparent rounded-full mx-auto mb-2"></div>
            <p class="text-sm text-gray-500">Generating...</p>
        </div>

        <div id="gen-error" class="mt-4 text-center text-red-400 text-sm hidden"></div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('prompt-input');
    const btn = document.getElementById('generate-btn');
    const result = document.getElementById('gen-result');
    const genImage = document.getElementById('gen-image');
    const genResponse = document.getElementById('gen-response');
    const loading = document.getElementById('gen-loading');
    const error = document.getElementById('gen-error');

    input.addEventListener('input', () => {
        btn.disabled = !input.value.trim();
    });

    btn.addEventListener('click', async () => {
        const prompt = input.value.trim();
        if (!prompt) return;

        result.classList.add('hidden');
        error.classList.add('hidden');
        loading.classList.remove('hidden');
        btn.disabled = true;

        try {
            const res = await fetch('/tools/image-gen', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const data = await res.json();
            loading.classList.add('hidden');
            btn.disabled = false;

            if (res.status === 402) {
                error.textContent = data.message || 'Insufficient credits.';
                error.classList.remove('hidden');
                return;
            }
            if (data.error) {
                error.textContent = data.error;
                error.classList.remove('hidden');
                return;
            }
            genResponse.textContent = data.response || 'Image generated successfully.';
            result.classList.remove('hidden');
            updateCredits(data.credits_remaining);
        } catch (e) {
            loading.classList.add('hidden');
            btn.disabled = false;
            error.textContent = 'Error generating image.';
            error.classList.remove('hidden');
        }
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !btn.disabled) btn.click();
    });
});
</script>
{% endblock %}
