{% extends "base.html" %}
{% block title %}Code Generation — NexerSuite{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Code Generation</h1>
    <p class="text-gray-500 text-sm mb-6">Generate code in any language using AI — uses 10 credits</p>
    <form id="codeForm" class="space-y-4">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Describe what you want to build</label>
                <textarea name="prompt" rows="4" placeholder='e.g. "A Python function to sort a list of dictionaries by a key"' required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500"></textarea>
            </div>
            <div class="mt-4">
                <label class="block text-sm text-gray-400 mb-2">Language</label>
                <select name="language" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                    <option value="html">HTML/CSS</option>
                </select>
            </div>
            <button type="submit" class="mt-4 w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Generate Code</button>
        </div>
    </form>
    <div id="result" class="mt-4 hidden">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <h3 class="text-sm font-medium mb-2">Generated Code</h3>
            <pre id="codeOutput" class="text-sm text-gray-300 bg-gray-950 rounded-lg p-4 overflow-x-auto"></pre>
            <button onclick="copyCode()" class="mt-3 text-xs text-purple-400 hover:text-purple-300 transition">Copy to clipboard</button>
            <p id="creditsInfo" class="text-xs text-gray-500 mt-2"></p>
        </div>
    </div>
</div>
<script>
document.getElementById('codeForm').onsubmit = async (e) => {
    e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Generating...'; btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const res = await fetch('/tools/code/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const d = await res.json();
    if (d.code) {
        document.getElementById('codeOutput').textContent = d.code;
        document.getElementById('creditsInfo').textContent = `Credits remaining: ${d.credits_remaining}`;
        document.getElementById('result').classList.remove('hidden');
    } else { alert(d.error); }
    btn.textContent = 'Generate Code'; btn.disabled = false;
};
function copyCode() {
    navigator.clipboard.writeText(document.getElementById('codeOutput').textContent);
}
</script>
{% endblock %}
