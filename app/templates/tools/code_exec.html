{% extends "base.html" %}
{% block title %}Code Execution — NexerSuite{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Code Execution</h1>
    <p class="text-gray-500 text-sm mb-6">Execute Python code in a sandboxed environment — uses 15 credits</p>
    <form id="execForm" class="space-y-4">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Python Code</label>
                <textarea name="code" rows="8" placeholder="print('Hello, World!')" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm font-mono focus:outline-none focus:border-purple-500"></textarea>
            </div>
            <button type="submit" class="mt-4 w-full bg-purple-600 hover:bg-purple-500 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition">Execute</button>
        </div>
    </form>
    <div id="result" class="mt-4 hidden">
        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-6">
            <h3 class="text-sm font-medium mb-2">Output</h3>
            <pre id="execOutput" class="text-sm text-gray-300 bg-gray-950 rounded-lg p-4 overflow-x-auto whitespace-pre-wrap"></pre>
            <p id="creditsInfo" class="text-xs text-gray-500 mt-2"></p>
        </div>
    </div>
</div>
<script>
document.getElementById('execForm').onsubmit = async (e) => {
    e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Executing...'; btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const res = await fetch('/tools/code/execute', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const d = await res.json();
    if (d.output) {
        document.getElementById('execOutput').textContent = d.output;
        document.getElementById('creditsInfo').textContent = `Credits remaining: ${d.credits_remaining}`;
        document.getElementById('result').classList.remove('hidden');
    } else { alert(d.error); }
    btn.textContent = 'Execute'; btn.disabled = false;
};
</script>
{% endblock %}
